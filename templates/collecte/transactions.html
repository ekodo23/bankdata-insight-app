{% extends "base.html" %}
{% block title %}Collecte Transactions{% endblock %}

{% block content %}
<div class="page-header">
    <h1>💳 Collecte de Transactions</h1>
    <p>Enregistrez les transactions bancaires des clients</p>
</div>

<div class="card">
    <form id="formTransaction" class="form-grid">
        <div class="form-group">
            <label>Client *</label>
            <select name="client_id" required>
                <option value="">Sélectionnez un client</option>
                {% for client in clients %}
                <option value="{{ client.id }}">{{ client.nom }} {{ client.prenom }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Type *</label>
            <select name="type" required>
                <option value="">Choisir</option>
                <option value="DEPOT">Dépôt</option>
                <option value="RETRAIT">Retrait</option>
                <option value="VIREMENT">Virement</option>
                <option value="PAIEMENT">Paiement</option>
            </select>
        </div>
        <div class="form-group">
            <label>Montant (XAF) *</label>
            <input type="number" name="montant" step="0.01" min="1" required placeholder="50000">
        </div>
        <div class="form-group">
            <label>Date *</label>
            <input type="date" name="date_transaction" required>
        </div>
        <div class="form-group">
            <label>Heure *</label>
            <input type="time" name="heure_transaction" required>
        </div>
        <div class="form-group">
            <label>Agence *</label>
            <select name="agence" required>
                <option value="">Sélectionnez</option>
                {% for agence in agences %}
                <option value="{{ agence.agence }}">{{ agence.agence }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Canal *</label>
            <select name="canal" required>
                <option value="">Choisir</option>
                <option value="Guichet">Guichet</option>
                <option value="GAB">GAB</option>
                <option value="Mobile Banking">Mobile Banking</option>
                <option value="Internet Banking">Internet Banking</option>
                <option value="Agence">Agence</option>
            </select>
        </div>
        <div class="form-group">
            <label>Catégorie</label>
            <select name="categorie">
                <option value="">Non catégorisé</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group full-width">
            <label>Description</label>
            <textarea name="description" rows="3"></textarea>
        </div>
        <div class="form-actions full-width">
            <button type="submit" class="btn-primary">✅ Enregistrer</button>
            <button type="reset" class="btn-secondary">🔄 Effacer</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('formTransaction').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.client_nom = this.querySelector('select[name="client_id"] option:checked').text;
    
    const response = await fetch('/collecte/transactions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const result = await response.json();
    if (result.success) {
        alert('✅ Transaction enregistrée !');
        this.reset();
    } else {
        alert('❌ Erreurs :\n' + result.errors.join('\n'));
    }
});
</script>
{% endblock %}
