{% extends "base.html" %}
{% block title %}Collecte Satisfaction{% endblock %}

{% block content %}
<div class="page-header">
    <h1>⭐ Enquête de Satisfaction Client</h1>
    <p>Évaluez la satisfaction des clients par dimension</p>
</div>

<div class="card">
    <form id="formSatisfaction" class="form-grid">
        <div class="form-group">
            <label>Client *</label>
            <select name="client_id" required>
                <option value="">Sélectionnez un client</option>
                {% for client in clients %}
                <option value="{{ client.id }}">{{ client.nom }} {{ client.prenom }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Agence *</label>
            <select name="agence" required>
                <option value="">Sélectionnez</option>
                {% for agence in agences %}
                <option value="{{ agence.agence }}">{{ agence.agence }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Date *</label>
            <input type="date" name="date_enquete" required>
        </div>
        <div class="form-group">
            <label>Score Global (1-10) *</label>
            <input type="number" name="score_global" min="1" max="10" required>
        </div>
        <div class="form-group">
            <label>Accueil (1-10)</label>
            <input type="number" name="score_accueil" min="1" max="10">
        </div>
        <div class="form-group">
            <label>Temps d'attente (1-10)</label>
            <input type="number" name="score_temps_attente" min="1" max="10">
        </div>
        <div class="form-group">
            <label>Conseil (1-10)</label>
            <input type="number" name="score_conseil" min="1" max="10">
        </div>
        <div class="form-group">
            <label>Digital (1-10)</label>
            <input type="number" name="score_digital" min="1" max="10">
        </div>
        <div class="form-group">
            <label>Canal *</label>
            <select name="canal_enquete" required>
                <option value="">Choisir</option>
                <option value="Face à face">Face à face</option>
                <option value="Téléphone">Téléphone</option>
                <option value="Email">Email</option>
                <option value="SMS">SMS</option>
            </select>
        </div>
        <div class="form-group">
            <label>Recommanderait ?</label>
            <select name="recommandation">
                <option value="0">Non</option>
                <option value="1">Oui</option>
            </select>
        </div>
        <div class="form-group full-width">
            <label>Commentaire</label>
            <textarea name="commentaire" rows="3"></textarea>
        </div>
        <div class="form-actions full-width">
            <button type="submit" class="btn-primary">✅ Enregistrer</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('formSatisfaction').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    
    const response = await fetch('/collecte/satisfaction', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const result = await response.json();
    if (result.success) {
        alert('✅ Enquête enregistrée !');
        this.reset();
    } else {
        alert('❌ Erreurs :\n' + result.errors.join('\n'));
    }
});
</script>
{% endblock %}
